services:
  db:
    image: postgres:18
    environment:
      POSTGRES_DB: agent_workbench
      POSTGRES_USER: agent_workbench
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agent_workbench_local}
    volumes:
      - db_data:/var/lib/postgresql
    ports:
      - "${DB_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_workbench"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: api
    command: uv run agent-workbench-api
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql+psycopg://agent_workbench:${POSTGRES_PASSWORD:-agent_workbench_local}@db/agent_workbench
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - api

  migrations:
    build: api
    command: uv run alembic upgrade head
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql+psycopg://agent_workbench:${POSTGRES_PASSWORD:-agent_workbench_local}@db/agent_workbench
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    profiles:
      - migrate

  web:
    build: web
    environment:
      AWB_API_URL: http://api:8000
      PORT: "3000"
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api
    profiles:
      - web

volumes:
  db_data:
